<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View iPhone photo GPS positions on an interactive 3D globe">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="MapMyPhotos">
  <title>MapMyPhotos</title>

  <!-- CesiumJS -->
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
  <aside id="sidebar">
    <header id="sidebar-header">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <span class="app-title">MapMyPhotos</span>
    </header>

    <div id="upload-section">
      <!-- Drag-drop zone -->
      <div id="dropzone" role="button" tabindex="0" aria-label="Drop photos here or click to select">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <p>Drop photos here</p>
        <small>or click to select</small>
      </div>

      <div class="btn-row">
        <button id="btn-pick" class="btn btn-primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Select Photos
        </button>
        <button id="btn-folder" class="btn btn-secondary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          Open Folder
        </button>
      </div>

      <div class="btn-row" id="map-actions" hidden>
        <button id="btn-view-all" class="btn btn-ghost">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          View All
        </button>
        <button id="btn-clear" class="btn btn-danger">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Clear All
        </button>
      </div>

      <div id="status-bar"></div>
    </div>

    <!-- Photo list -->
    <div id="photo-list" role="list">
      <div id="empty-state">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <p>Upload iPhone photos to see their GPS positions on the globe</p>
        <small>The orange cone shows the direction the photo was taken</small>
      </div>
    </div>
  </aside>

  <!-- ── Globe ──────────────────────────────────────────────────────────── -->
  <main id="globe-container">
    <div id="cesiumContainer"></div>
    <div id="globe-loading">
      <div class="spinner"></div>
      <p>Loading 3D globe…</p>
    </div>
  </main>

  <!-- ── Photo detail modal ─────────────────────────────────────────────── -->
  <div id="modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="modal-header">
        <span id="modal-filename"></span>
        <button id="modal-close" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="modal-photo-wrap">
          <img id="modal-img" alt="">
        </div>
        <table id="modal-meta" class="meta-table"></table>
      </div>
    </div>
  </div>

  <!-- Hidden file inputs -->
  <input type="file" id="file-input" accept="image/*,.heic,.heif" multiple hidden>
  <input type="file" id="folder-input" accept="image/*,.heic,.heif" multiple webkitdirectory hidden>

  <script type="module" src="app.js"></script>
</body>
</html>
